<!DOCTYPE html>
<html>
<head>
    <title>Post Job</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Post a New Job</h2>
    <button onclick="back()">⬅ Back</button>
    <button onclick="logout()">Logout</button>

    <form id="postJobForm">
        <input type="text" id="title" placeholder="Job Title" required><br>
        <input type="text" id="company" placeholder="Company Name" required><br>
        <input type="text" id="location" placeholder="Location" required><br>
        <input type="text" id="salary" placeholder="Salary" required><br>
        <textarea id="description" placeholder="Job Description" required></textarea><br>
        <button type="submit">Post Job</button>
    </form>

    <script src="post_job.js"></script>
</body>
</html>
